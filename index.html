<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Lab Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #2e2d4d, #0f0e1a 60%);
        color: #f5f5f5;
        font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        overflow: hidden;
        text-align: center;
      }

      .countdown {
        font-size: clamp(2.5rem, 12vw, 7rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        font-variant-numeric: tabular-nums;
        text-transform: uppercase;
        filter: drop-shadow(0 0.75rem 1.75rem rgba(0, 0, 0, 0.4));
      }

      .countdown-label {
        margin: 0;
        font-size: clamp(0.85rem, 1.8vw, 1.1rem);
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="countdown" aria-live="polite">00:00:00:00</div>
      <p class="countdown-label">Time until launch</p>
    </main>

    <script type="module">
      import { createTimer } from 'https://cdn.jsdelivr.net/npm/animejs@4.2.0/dist/modules/index.js';

      const countdownEl = document.querySelector('.countdown');
      if (!countdownEl) {
        console.warn('Countdown element missing from the page.');
      } else {
        const totalMilliseconds = 5 * 24 * 60 * 60 * 1000;
        const targetTime = Date.now() + totalMilliseconds;
        let lastRenderedSecond = -1;

        const pad = value => String(value).padStart(2, '0');

        const renderCountdown = remainingMs => {
          const clampedMs = Math.max(remainingMs, 0);
          const totalSeconds = Math.floor(clampedMs / 1000);
          const days = Math.floor(totalSeconds / 86400);
          const hours = Math.floor((totalSeconds % 86400) / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;
          countdownEl.textContent = `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        };

        renderCountdown(targetTime - Date.now());
        lastRenderedSecond = Math.floor((targetTime - Date.now()) / 1000);

        createTimer({
          duration: totalMilliseconds,
          autoplay: true,
          onBegin: () => renderCountdown(targetTime - Date.now()),
          onUpdate: timer => {
            const remaining = Math.max(targetTime - Date.now(), 0);
            const wholeSeconds = Math.floor(remaining / 1000);
            if (wholeSeconds !== lastRenderedSecond) {
              lastRenderedSecond = wholeSeconds;
              renderCountdown(remaining);
            }
          },
          onComplete: () => renderCountdown(0),
        });
      }
    </script>
  </body>
</html>
