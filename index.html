<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Lab Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #2e2d4d, #0f0e1a 60%);
        color: #f5f5f5;
        font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        overflow: hidden;
        text-align: center;
      }

      .countdown {
        font-size: clamp(2.5rem, 12vw, 7rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        font-variant-numeric: tabular-nums;
        text-transform: uppercase;
        filter: drop-shadow(0 0.75rem 1.75rem rgba(0, 0, 0, 0.4));
      }

      .countdown-label {
        margin: 0;
        font-size: clamp(0.85rem, 1.8vw, 1.1rem);
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="countdown" aria-live="polite">00:00:00:00</div>
      <p class="countdown-label">Time until launch</p>
      <a class="about-link" href="about.html">About Project</a>
    </main>

    <script type="module">
      import { createTimer } from 'https://cdn.jsdelivr.net/npm/animejs@4.2.0/dist/modules/index.js';

      const countdownEl = document.querySelector('.countdown');
      if (!countdownEl) {
        console.warn('Countdown element missing from the page.');
      } else {
        const STORAGE_KEY = 'codex-countdown-target';
        const FIVE_DAYS_MS = 5 * 24 * 60 * 60 * 1000;

        const getStoredTarget = () => {
          try {
            const rawValue = localStorage.getItem(STORAGE_KEY);
            if (!rawValue) return null;
            const parsedValue = Number(rawValue);
            return Number.isFinite(parsedValue) ? parsedValue : null;
          } catch (error) {
            console.warn('Unable to access localStorage for countdown persistence.', error);
            return null;
          }
        };

        const setStoredTarget = value => {
          try {
            localStorage.setItem(STORAGE_KEY, String(value));
          } catch (error) {
            console.warn('Unable to store countdown target time.', error);
          }
        };

        const now = Date.now();
        let targetTime = getStoredTarget();

        if (!targetTime || targetTime <= now) {
          targetTime = now + FIVE_DAYS_MS;
          setStoredTarget(targetTime);
        }

        let lastRenderedSecond = -1;
        const pad = value => String(value).padStart(2, '0');

        const renderCountdown = remainingMs => {
          const clampedMs = Math.max(remainingMs, 0);
          const totalSeconds = Math.floor(clampedMs / 1000);
          const days = Math.floor(totalSeconds / 86400);
          const hours = Math.floor((totalSeconds % 86400) / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;
          countdownEl.textContent = `${pad(days)}:${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
        };

        const updateDisplay = () => {
          const remaining = Math.max(targetTime - Date.now(), 0);
          const wholeSeconds = Math.floor(remaining / 1000);
          if (wholeSeconds !== lastRenderedSecond) {
            lastRenderedSecond = wholeSeconds;
            renderCountdown(remaining);
          }
        };

        const remainingDuration = Math.max(targetTime - Date.now(), 0);
        renderCountdown(remainingDuration);
        lastRenderedSecond = Math.floor(remainingDuration / 1000);

        if (remainingDuration > 0) {
          createTimer({
            duration: remainingDuration,
            autoplay: true,
            onBegin: updateDisplay,
            onUpdate: updateDisplay,
            onComplete: () => {
              renderCountdown(0);
              try {
                localStorage.removeItem(STORAGE_KEY);
              } catch (error) {
                console.warn('Unable to clear stored countdown target.', error);
              }
            },
          });
        }
      }
    </script>
    <style>
      .about-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        color: inherit;
        text-decoration: none;
        letter-spacing: 0.18em;
        font-size: 0.85rem;
        text-transform: uppercase;
        transition: background-color 180ms ease, color 180ms ease,
          border-color 180ms ease;
        backdrop-filter: blur(4px);
      }

      .about-link:hover,
      .about-link:focus-visible {
        background: rgba(255, 255, 255, 0.16);
        border-color: rgba(255, 255, 255, 0.6);
        outline: none;
      }
    </style>
  </body>
</html>
